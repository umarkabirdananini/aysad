<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:70px;
color:white;
text-align:center;
overflow-x:hidden;
background:linear-gradient(270deg,#020024,#090979,#00d4ff);
background-size:600% 600%;
animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
position:relative;
z-index:2;
padding:40px;
max-width:850px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 40px rgba(0,255,255,0.25);
}

/* LOGO AREA */

.logo-wrapper{
position:relative;
display:inline-block;
margin-bottom:10px;
}

/* HALO */

.logo-wrapper::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:230px;
height:230px;
border-radius:50%;
background:radial-gradient(circle, rgba(0,255,213,0.5), transparent 70%);
filter:blur(15px);
z-index:-1;
}

/* ROTATING LIGHT RING */

.logo-wrapper::after{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:260px;
border-radius:50%;
border:2px dashed rgba(0,255,213,0.4);
animation:spin 12s linear infinite;
z-index:-1;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* LOGO */

.logo-img{
width:170px;
margin-top:10px;
margin-bottom:15px;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
from{filter:drop-shadow(0 0 10px #00ffd5);}
to{filter:drop-shadow(0 0 30px #00ffd5);}
}

.logo-text{
font-size:50px;
font-weight:bold;
letter-spacing:4px;
color:#00ffd5;
margin-bottom:10px;
}

/* TAGLINE */

.tagline{
font-size:22px;
margin-bottom:25px;
}

/* FEATURES */

.features{
font-size:18px;
line-height:2;
margin-bottom:30px;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.box{
background:rgba(255,255,255,0.1);
padding:15px 25px;
border-radius:12px;
min-width:90px;
}

.box span{
display:block;
font-size:35px;
font-weight:bold;
color:#00ffd5;
}

/* REGISTER BUTTON */

.register-btn{
display:inline-block;
padding:14px 28px;
font-size:18px;
font-weight:bold;
text-decoration:none;
color:white;
border-radius:50px;
background:linear-gradient(45deg,#00ffd5,#00a8ff);
box-shadow:0 0 20px #00ffd5;
transition:0.3s;
}

.register-btn:hover{
transform:scale(1.08);
box-shadow:0 0 40px #00ffd5;
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.8;
}

/* FLOATING EMOJIS */

.emoji{
position:absolute;
font-size:32px;
animation:float linear forwards;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(110vh) rotate(0deg);
opacity:0;
}
10%{opacity:1;}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* STADIUM LIGHT */

.light{
position:absolute;
width:450px;
height:450px;
background:radial-gradient(circle, rgba(0,255,255,0.3), transparent);
animation:lightMove 10s linear infinite;
}

@keyframes lightMove{
0%{transform:translate(-200px,-200px);}
50%{transform:translate(200px,200px);}
100%{transform:translate(-200px,-200px);}
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#00ffd5;
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00c4a3;
}

@media(max-width:600px){

.logo-text{
font-size:35px;
}

.tagline{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

</div>

<div class="logo-text">AYSAD ARENA</div>

<div class="tagline">

<div class="features">
⚽ Sports Arena<br>
🏋️ Gym & Fitness Center<br>

🎮 Entertainment Zone<br>

</div>

<div class="countdown">

<div class="box"><span id="days">0</span>Days</div>
<div class="box"><span id="hours">0</span>Hours</div>
<div class="box"><span id="minutes">0</span>Minutes</div>
<div class="box"><span id="seconds">0</span>Seconds</div>

</div>

<audio id="crowdSound" loop>
<source src="https://cdn.pixabay.com/download/audio/2025/11/12/audio_48b7925981.mp3?filename=vishiv-crowd-cheering-in-stadium-435357.mp3">
</audio>

<script>

const launchDate = new Date();
launchDate.setDate(launchDate.getDate() + 7);

function updateCountdown(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;

}

setInterval(updateCountdown,1000);

const emojis=["⚽","🏀","🏋️","🥊","🍔","🎮","🏆","🎾"];

function createEmoji(){

const emoji=document.createElement("div");
emoji.classList.add("emoji");

emoji.innerText=emojis[Math.floor(Math.random()*emojis.length)];
emoji.style.left=Math.random()*100+"vw";
emoji.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(emoji);

setTimeout(()=>{emoji.remove();},12000);

}

setInterval(createEmoji,500);

const crowd=document.getElementById("crowdSound");

function toggleSound(){
if(crowd.paused){crowd.play();}
else{crowd.pause();}
}

</script>
